<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="elaraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#00f3ff"/>
            <stop offset="100%" stopColor="#ff00ea"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="none" stroke="url(#elaraGrad)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="15" fill="#ffffff" filter="url(#glow)"/>
</svg>
