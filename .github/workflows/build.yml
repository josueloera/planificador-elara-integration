name: Build Mac and Windows App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build macOS App
      run: npm run dist -- --mac --universal
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Upload Mac Installer to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.0-build"
        name: "Planificador Docente Primaria - Compilación"
        draft: false
        prerelease: true
        files: |
          release/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Windows App
      run: npm run dist -- --win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows Installer to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.0-build"
        name: "Planificador Docente Primaria - Compilación"
        draft: false
        prerelease: true
        files: |
          release/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
